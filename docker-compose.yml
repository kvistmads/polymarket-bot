services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: polymarket
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d polymarket"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Eksponér IKKE postgres til omverdenen — kun internt i Docker-netværk

  monitor:
    build: .
    command: python monitor.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql+asyncpg://bot:${POSTGRES_PASSWORD}@postgres/polymarket
      FOLLOWED_WALLETS: ${FOLLOWED_WALLETS}
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  executor:
    build: .
    command: python executor.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql+asyncpg://bot:${POSTGRES_PASSWORD}@postgres/polymarket
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY}
      MAX_DAILY_LOSS: ${MAX_DAILY_LOSS:-50}
      POSITION_SIZE_PCT: ${POSITION_SIZE_PCT:-0.05}
      DRY_RUN: ${DRY_RUN:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
